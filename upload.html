<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Upload | Auroun DataSYN</title>

<style>

body{
    margin:0;
    font-family:Arial;
    background:#0b1120;
    color:white;
}

.container{
    width:60%;
    margin:auto;
    padding-top:60px;
    text-align:center;
}

.card{
    background:#1e293b;
    padding:25px;
    border-radius:12px;
    box-shadow:0 0 10px rgba(0,0,0,0.4);
}

input[type="file"]{
    padding:10px;
    margin:20px 0;
    background:#0f172a;
    color:white;
    border:1px solid #334155;
    border-radius:8px;
}

.btn{
    padding:12px 20px;
    background:#2563eb;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:15px;
}

.btn:hover{
    background:#1d4ed8;
}

h1{
    color:#60a5fa;
}

.info{
    color:#94a3b8;
    font-size:14px;
    margin-top:10px;
}

</style>
</head>

<body>

<div class="container">

    <div class="card">

        <h1>📁 Upload Dataset</h1>

        <p class="info">
            Upload CSV or Excel file to start AI analysis
        </p>

        <form method="POST" action="/upload" enctype="multipart/form-data">

            <input type="file" name="file" required>

            <br>

            <button class="btn" type="submit">
                🚀 Upload & Analyze
            </button>

        </form>

        <p class="info">
            Supported formats: .csv, .xlsx
        </p>

    </div>

</div>

</body>
</html>
