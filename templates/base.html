<!DOCTYPE html>
<html>
<head>
    <title>Auroun DataSYN</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #0b1220;
            color: white;
        }

        .sidebar {
            position: fixed;
            width: 220px;
            height: 100%;
            background: rgba(0,0,0,0.6);
            padding: 20px;
        }

        .sidebar a {
            display: block;
            color: white;
            padding: 10px;
            text-decoration: none;
        }

        .main {
            margin-left: 220px;
            padding: 20px;
        }

        .card {
            background: rgba(255,255,255,0.08);
            padding: 15px;
            margin-top: 15px;
            border-radius: 12px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 10px;
        }

        .btn {
            padding: 10px 15px;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 8px;
        }

        img {
            width: 100%;
            border-radius: 10px;
        }
    </style>
</head>

<body>

<div class="sidebar">
    <h2>Auroun DataSYN</h2>
    <a href="/">Home</a>
    <a href="/upload">Upload</a>
    <a href="/services">Services</a>
    <a href="/careers">Careers</a>
    <a href="/contact">Contact</a>
</div>

<div class="main">
    {% block content %}{% endblock %}
</div>

</body>
</html>
